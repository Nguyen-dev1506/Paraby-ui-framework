name: Paraby CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest customtkinter Cython

    - name: Build Cython Extensions
      run: |
        python setup.py build_ext --inplace --force

    - name: Setup display (Xvfb)
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb

    - name: Run Pytest
      run: |
        xvfb-run python -m pytest test_parser.py test_loop.py test_loop_events.py test_cython/test_sync.py -v
